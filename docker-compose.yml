services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whatsapp_randevu
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d whatsapp_randevu"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    command: sh -c "npx prisma db push && npm run db:seed && npm run start"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/whatsapp_randevu?schema=public
      AUTH_SECRET: change-this-to-a-long-random-secret
      APP_URL: http://localhost:3000
      TZ: Europe/Istanbul
      SEED_OWNER_EMAIL: owner@example.com
      SEED_OWNER_PASSWORD: owner12345
      SEED_TENANT_ADMIN_EMAIL: salon@example.com
      SEED_TENANT_ADMIN_PASSWORD: salon12345
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: npm run worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/whatsapp_randevu?schema=public
      AUTH_SECRET: change-this-to-a-long-random-secret
      TZ: Europe/Istanbul
      CHROME_EXECUTABLE_PATH: /usr/bin/chromium
      WHATSAPP_SESSION_DIR: /app/.wwebjs_auth
    volumes:
      - whatsapp-sessions:/app/.wwebjs_auth
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
  whatsapp-sessions:
