services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whatsapp_randevu
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d whatsapp_randevu"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    restart: unless-stopped
    command: sh -c "npx prisma db push && npm run db:seed && npm run start"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/whatsapp_randevu?schema=public
      AUTH_SECRET: change-this-to-a-long-random-secret
      APP_URL: http://localhost:3000
      TZ: Europe/Istanbul
      SEED_OWNER_EMAIL: owner@example.com
      SEED_OWNER_PASSWORD: owner12345
      SEED_TENANT_ADMIN_EMAIL: salon@example.com
      SEED_TENANT_ADMIN_PASSWORD: salon12345
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build: .
    restart: unless-stopped
    command: npm run worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/whatsapp_randevu?schema=public
      AUTH_SECRET: change-this-to-a-long-random-secret
      TZ: Europe/Istanbul
      CHROME_EXECUTABLE_PATH: /usr/bin/chromium
      WHATSAPP_SESSION_DIR: /app/.wwebjs_auth
      WORKER_HEALTH_PORT: "3100"
      WORKER_SHARD_COUNT: "1"
      WORKER_SHARD_INDEX: "0"
      WORKER_MAX_TENANTS: "25"
      WORKER_SYNC_INTERVAL_MS: "30000"
      WORKER_HEARTBEAT_INTERVAL_MS: "30000"
      WORKER_RESTART_DELAY_MS: "15000"
      REMINDER_MAX_ATTEMPTS: "10"
      REMINDER_BATCH_SIZE: "50"
    volumes:
      - whatsapp-sessions:/app/.wwebjs_auth
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3100/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  postgres-data:
  whatsapp-sessions:
